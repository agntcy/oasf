name: Build

on:
  workflow_call:
    inputs:
      image_repo:
        required: true
        type: string
        description: "Image repo to use."
      image_tag:
        required: true
        type: string
        description: "Image tag to use."
      build_multi_arch:
        required: true
        type: boolean
        description: "Whether to also build additional architecture artifacts."
      artifact_path:
        required: true
        type: string
        description: "Path where to upload the image artifacts."

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@d632683dd7b4114ad314bca15554477dd762a938 # v4.2.0
        with:
          fetch-depth: 0

      - name: Setup QEMU
        uses: docker/setup-qemu-action@49b3bc8e6bdd4a60e6116a5414239cba5943d3cf # v3.2.0

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@c47758b77c9736f4b2ef4073d4d51994fabfe349 # v3.7.1

      - name: Cache Docker layers
        uses: actions/cache@1bd1e32a3bdc45362d1e726936510720a7c30a57 # v4.2.0
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-oasf-server-buildx-${{ github.ref }}
          restore-keys: |
            ${{ runner.os }}-oasf-server-buildx-

      - name: Create cache directory
        run: mkdir -p /tmp/.buildx-cache

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: notused
          password: ${{ secrets.GITHUB_TOKEN  }}

      - name: Build amd64 image artifact
        uses: docker/bake-action@v6.10.0
        with:
          source: .
          files: ./docker-bake.hcl
          targets: oasf-server
          provenance: false
          allow: fs.write=/tmp
          set: |
            *.platform=linux/amd64
            *.cache-to=type=local,dest=/tmp/.buildx-cache
            *.cache-from=type=local,src=/tmp/.buildx-cache
            *.cache-from=type=registry,ref=${{ inputs.image_repo }}/oasf-server
            *.tags=${{ inputs.image_repo }}/oasf-server:${{ inputs.image_tag }}
            *.output=type=docker,dest=/tmp/oasf-server-amd64.tar

      - name: Build arm64 image artifact
        if: ${{ inputs.build_multi_arch }}
        uses: docker/bake-action@v6.10.0
        with:
          source: .
          files: ./docker-bake.hcl
          targets: oasf-server
          provenance: false
          allow: fs.write=/tmp
          set: |
            *.platform=linux/arm64
            *.cache-to=type=local,dest=/tmp/.buildx-cache
            *.cache-from=type=local,src=/tmp/.buildx-cache
            *.cache-from=type=registry,ref=${{ inputs.image_repo }}/oasf-server
            *.tags=${{ inputs.image_repo }}/oasf-server:${{ inputs.image_tag }}-arm64
            *.output=type=docker,dest=/tmp/oasf-server-arm64.tar

      - name: Upload image artifact
        id: upload-artifacts
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08 # v4.6.0
        with:
          name: ${{ inputs.artifact_path }}
          path: /tmp/oasf-server-*.tar
          if-no-files-found: error
          retention-days: 1
          compression-level: 0
          overwrite: true
