syntax = "proto3";

package agntcy.oasf.modules.traits.runtime.v1alpha1;

// Requirements is the payload for a Module of type "traits/runtime/requirements".
// It declares the runtime prerequisites needed to execute the parent module.
//
// Composition mode: replace. When present on both a parent and one of its
// submodules, the inner Requirements replaces the outer one for that subtree.
message Requirements {
  // Binaries required on the host, optionally with version constraints
  // (e.g. "node>=18", "photoshop>=25").
  repeated string binaries = 1;

  // Outbound network destinations the module needs to reach. Values may be
  // hostnames, hostname patterns, or "*" for unrestricted access.
  repeated string network = 2;

  // Environment variables that must be set before the module runs.
  // Values are the names of the required variables (not their values).
  repeated string env_vars = 3;
}
