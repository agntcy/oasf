apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-schema-versions
  labels:
    app: {{ .Chart.Name }}
data:
  versions: |-
    {"versions":[
      {{- range $index, $version := .Values.image.versions -}}
      {{- if $index }},{{ end }}
      {"schema_version":"{{ $version.schema }}","server_version":"{{ $version.server }}","api_version":"{{ default $version.server $version.api }}"}
      {{- end -}}
    ]}
